<!DOCTYPE html>
<html>
<head>
	<title>Slide Viewer</title>
	
	<script src="https://openseadragon.github.io/openseadragon/openseadragon.min.js">
	</script>

	<style>
		body {
			margin: 0;
			display: flex;
			background: black;
			color: white;
			font-family: Arial;
		}

		#sidebar {
			position: fixed;
			left: -300px; /* hidden by default */
			top: 0;
			width: 300px;
			height: 100%;
			background: #222;
			padding: 15px;
			overflow-y: auto;
			transition: left 0.3s ease;
			z-index: 1000;
		}

		#sidebar.open {
			left: 0;
		}

		#viewer {
			width: 100%;
			height: 100vh;
		}

		#toggleTab {
			position: fixed;
			left: 0;
			top: 50%;
			transform: translateY(-50%);
			background: #444;
			color: white;
			padding: 10px;
			cursor: pointer;
			z-index: 1100;
			border-radius: 0 5px 5px 0;
			font-size: 14px;
		}

		h2 {
			margin-top: 0;
		}

		.meta {
			margin-bottom: 10px;
		}

		.label {
			font-weight: bold;
		}
	</style>
</head>

<body>

	<div id="toggleTab">☰</div>

	<div id="sidebar">
		<h2 id="title">Loading...</h2>
		<p id="description"></p>
		
		<div class="meta"><span class="label">Owner:</span> <span id="owner"></span></div>
		<div class="meta"><span class="label">Date:</span> <span id="date"></span></div>
		<div class="meta"><span class="label">Tissue:</span> <span id="tissue"></span></div>
		<div class="meta"><span class="label">System:</span> <span id="system"></span></div>
		<div class="meta"><span class="label">Stain:</span> <span id="stain"></span></div>
		<div class="meta"><span class="label">Magnification:</span> <span id="magnification"></span></div>
		<div class="meta"><span class="label">Tags:</span> <span id="tags"></span></div>
	</div>
	
	<div id="viewer"></div>
	
	<script>
		const blob = "leeshistology";
		const params = new URLSearchParams(window.location.search);
		const slideID = params.get("slide");
		const sidebar = document.getElementById("sidebar");
		const togtab = document.getElementById("toggleTab");

		togtab.addEventListener("click", () => {
			sidebar.classList.toggle("open");
		});
	
		if (!slideID) {
			document.body.innerHTML = "<h1 style='color:white'>Error: No slide specified</h1>";
		}
	
		// Load metadata
		fetch("slides.json")
		.then(res => {
			if (!res.ok) throw new Error("Failed to load slides.json");
				return res.json();
		})
	  
		.then(slides => {
			const slide = slides.find(s => s.ID === slideID);
			if (!slide) {
				throw new Error("Slide not found in JSON");
			}
			populateSidebar(slide);
			loadViewer(slide);
		})
		.catch(err => {
			console.error(err);
			document.body.innerHTML = "<h1 style='color:white'>Error loading slide information</h1>";
		});
	
		// Populate sidebar
		function populateSidebar(slide) {
			const meta = slide.metadata;
			const date = `${meta.Month || ""} ${meta.Day || ""}, ${meta.Year || ""}`;
			document.getElementById("title").textContent = slide.Title;
			document.getElementById("description").textContent = slide.Description;
			document.getElementById("owner").textContent = meta.Owner || "";
			document.getElementById("tissue").textContent = meta.Tissue || "";
			document.getElementById("system").textContent = meta.System || "";
			document.getElementById("stain").textContent = meta.Stain || "";
			document.getElementById("magnification").textContent = meta.Magnification || "";
			document.getElementById("tags").textContent = (meta.tags || []).join(", ");
			document.getElementById("date").textContent = date;
		}
	
		// Initialize OpenSeadragon
		function loadViewer(slide) {
			const dziUrl = `https://${blob}.blob.core.windows.net/${blob}/slides/${slide.ID}/${slide.ID}.dzi`;
			OpenSeadragon({
				id: "viewer",
				prefixUrl: "https://openseadragon.github.io/openseadragon/images/",
				tileSources: dziUrl,
				
				showNavigator: true,
				crossOriginPolicy: 'Anonymous',
				navigatorPosition: "TOP_RIGHT",
				navigatorAutoFade: false,
				minZoomImageRatio: 0.9,
				visibilityRatio: 1.0,
				navigatorAutoResize: true,
				navigatorBackground: "#222",
				navigatorBorderColor: "#999",
				navigatorDisplayRegionColor: "red",
				
				showZoomControl: true,
				showHomeControl: true,
				showFullPageControl: true,
				showRotationControl: false
			});
		}
	</script>

</body>
</html>
