<!DOCTYPE html>
<html>
<head>
	<title>Slide Viewer</title>
	
	<script src="https://openseadragon.github.io/openseadragon/openseadragon.min.js">
	</script>

	<style>
		body {
			margin: 0;
			display: flex;
			background: black;
			color: white;
			font-family: Arial;
			padding: 0;
			height: 100%;
		}

		#backButton {
			display: block;
			margin-top: 10px;
			margin-bottom: 15px;
			width: 40%;
			background-color: #CFB87C;
			color: #000;
			padding: 8px;
			cursor: pointer;
			border-radius: 5px;
			text-align: center;
		}

		#linkButton {
			display: block;
			margin-top: 10px;
			margin-bottom: 15px;
			width: 40%;
			background-color: #CFB87C;
			color: #000;
			padding: 8px;
			cursor: pointer;
			border-radius: 5px;
			text-align: center;
		}

		#sidebar {
			position: fixed;
			left: -315px; /* hidden by default */
			top: 0;
			width: 300px;
			height: 100%;
			background: #222;
			padding: 15px;
			overflow-y: auto;
			transition: left 0.3s ease;
			z-index: 1000;
		}

		#sidebar.open {
			left: 0;
		}

		#toggleTab {
			position: fixed;
			left: 0;
			top: 50%;
			transform: translateY(-50%);
			background: #222;
			color: white;
			padding: 10px;
			cursor: pointer;
			transition: left 0.3s ease;
			z-index: 1100;
			border-radius: 0 5px 5px 0;
			font-size: 14px;
		}

		#toggleTab.open {
			left: 315px;
		}

		h2 {
			margin-top: 0;
		}

		.meta {
			margin-bottom: 10px;
		}

		.label {
			font-weight: bold;
		}

		.annotation {
			position: absolute;
			width: 14px;
			height: 14px;
			border: 1px solid white;
			background: black;
			border-radius: 50%;
			z-index: 500;
		}

		#viewer {
			width: 100%;
			height: 100vh;
			z-index: 0;
			cursor: pointer;
		}
		
		#annotationSVG {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 10;
		}
		
		.annotation-label {
			position: absolute;
			background: #222;
			color: white;
			padding: 4px;
			font-size: 12px;
			border-radius: 4px;
			display: none;
			z-index: 500;
		}

		.annotation-item {
			padding: 6px;
			margin: 4px 0;
			background: #222;
			cursor: pointer;
			border-left: 6px solid black;
			font-size: 13px;
		}
		
		.annotation-item:hover {
			background: #555;
		}
		
		.annotation-toggle {
			margin-right: 6px;
		}

		#annotationEditor {
			position: absolute;
			top: 80px;
			right: 20px;
			width: 220px;
			background: #222;
			border: 1px solid #ccc;
			padding: 10px;
			z-index: 2000;
			cursor: move;
		}
		
		.hidden {
			display: none;
		}

		.openseadragon-container .openseadragon-canvas + div {
			top: auto !important;
			bottom: 10px !important;
			left: 50% !important;
			right: auto !important;
			transform: translateX(-50%);
		}

	</style>
</head>

<body>

	<div id="toggleTab">☰</div>

	<div id="sidebar">
		<div id="backButton">Gallery Home</div>
		
		<h2 id="title">Loading...</h2>
		<p id="description"></p>
		
		<div class="meta"><span class="label">Owner:</span> <span id="owner"></span></div>
		<div class="meta"><span class="label">Date:</span> <span id="date"></span></div>
		<div class="meta"><span class="label">Tissue:</span> <span id="tissue"></span></div>
		<div class="meta"><span class="label">System:</span> <span id="system"></span></div>
		<div class="meta"><span class="label">Stain:</span> <span id="stain"></span></div>
		<div class="meta"><span class="label">Magnification:</span> <span id="magnification"></span></div>
		<div class="meta"><span class="label">Tags:</span> <span id="tags"></span></div>

		<div id="linkButton">Generate Link to Current View</div>

		<div id="annotationControls">
			<h3>Annotations</h3>
			
			<button id="toggleAnnotations">Hide Annotations</button>
			<button id="addAnnotation">Add Annotation</button>
			<button id="exportAnnotations">Export Annotations</button>
		</div>

		<div id="annotationListContainer">
			<h3>Annotations</h3>
			<div id="annotationList"></div>
		</div>
		
	</div>

	<div id="annotationEditor" class="hidden">
		<h3>Annotation Editor</h3>
		<div>
			<button data-tool="point">Point</button>
			<button data-tool="line">Line</button>
			<button data-tool="rect">Rectangle</button>
			<button data-tool="ellipse">Ellipse</button>
			<button data-tool="polygon">Polygon</button>
		</div>
		
		<div>
			<label>Color:</label>
			<input type="color" id="colorPicker" value="#ff0000">
		</div>
		
		<button id="finishEditing">Finish Editing</button>
	</div>
	
	<div id="viewer">
		<svg id="annotationSVG"></svg>
	</div>
	
	<script>
		const blob = "leeshistology";
		const params = new URLSearchParams(window.location.search);
		const slideID = params.get("slide");
		const sidebar = document.getElementById("sidebar");
		const togtab = document.getElementById("toggleTab");
		const toggleBtn = document.getElementById("toggleAnnotations");
		let globalAnnotationsVisible = true;
		let annotationsVisible = true;
		let annotationMode = null;
		let annotations = [];
		let viewer;

		togtab.addEventListener("click", () => {
			sidebar.classList.toggle("open");
			toggleTab.classList.toggle("open");
		});
	
		// Catch if slide cannot be displayed
		if (!slideID) {
			document.body.innerHTML = "<h1 style='color:white'>Error: No slide specified</h1>";
		}

		// Load metadata
		fetch("slides.json")
			.then(res => {
				if (!res.ok) throw new Error("Failed to load slides.json");
				return res.json();
			})
			.then(slides => {
				const slide = slides.find(s => s.ID === slideID);
				if (!slide) {
					throw new Error("Slide not found in JSON");
				}
				populateSidebar(slide);
				loadViewer(slide);
			})
			.catch(err => {
				console.error(err);
				document.body.innerHTML = "<h1 style='color:white'>Error loading slide information</h1>";
			});

		// Populate sidebar
		function populateSidebar(slide) {
			const meta = slide.metadata;
			const date = `${meta.Month || ""} ${meta.Day || ""}, ${meta.Year || ""}`;
			document.getElementById("title").textContent = slide.Title;
			document.getElementById("description").textContent = slide.Description;
			document.getElementById("owner").textContent = meta.Owner || "";
			document.getElementById("tissue").textContent = meta.Tissue || "";
			document.getElementById("system").textContent = meta.System || "";
			document.getElementById("stain").textContent = meta.Stain || "";
			document.getElementById("magnification").textContent = meta.Magnification || "";
			document.getElementById("tags").textContent = (meta.tags || []).join(", ");
			document.getElementById("date").textContent = date;
		}

		// Button to return to slide gallery
		document.getElementById("backButton").onclick = () => {
			window.location.href = "index.html";
		};

		// Button to generate URL link
		document.addEventListener("DOMContentLoaded", () => {
			document.getElementById("linkButton").onclick = () => {
				copyLink();
			};
		});

		// Button to initiate annotating
		document.getElementById("addAnnotation").onclick = () => {
			try{
				console.log("Opening annotation editor"); // debug
				const editor = document.getElementById("annotationEditor");
				if (!editor) {
					console.error("Annotation editor not found!");
					return;
				}
				editor.classList.remove("hidden");
				document.getElementById("sidebar").style.display = "none"; // Remove sidebar while annotating
				document.getElementById("toggleTab").style.display = "none"; // Remove sidebar tab while annotating
				annotationMode = null; // Wait for tool selection
				document.getElementById("viewer").style.cursor = "default";
			} catch (err) {
				console.error("Annotation error:", err);
				annotationMode = null;
				document.getElementById("viewer").style.cursor = "default";
			}
		};

		// Switching between annotation modes (i.e., point, line, shape)
		document.querySelectorAll("#annotationEditor button[data-tool]")
			.forEach(btn => {
				btn.onclick = () => {
					setAnnotationMode(btn.dataset.tool);
				};
			});
		
		// Button to complete annotating
		document.getElementById("finishEditing").onclick = () => {
			annotationMode = null;
			document.getElementById("annotationEditor").classList.add("hidden");
			document.getElementById("sidebar").style.display = "block"; // Restore sidebar
			document.getElementById("toggleTab").style.display = "block"; // Restore sidebar toggle
			document.getElementById("viewer").style.cursor = "default"; // Return cursor to default
		};

		// Button to hide/show annotations globally
		toggleBtn.onclick = () => {
			globalAnnotationsVisible = !globalAnnotationsVisible;
			console.log("Global visibility:", globalAnnotationsVisible);
			if (globalAnnotationsVisible) {
				toggleBtn.textContent = "Hide Annotations";
				annotations.forEach(a => {
					a.visible = true;
					if (a.element) updateAnnotationVisibility(a);
				});
				document.querySelectorAll(".annotation-toggle").forEach(cb => {
					cb.checked = true;
				});
			} else {
				toggleBtn.textContent = "Show Annotations";
				annotations.forEach(a => {
					if (a.element) updateAnnotationVisibility(a);
				});
			}
		};

		// Button to export annotations
		document.getElementById("exportAnnotations").onclick = () => {
			const clean = annotations.map(a => {
				return {
					id: a.id,
					type: a.type,
					text: a.text,
					color: a.color,
					x: a.x,
					y: a.y,
					x1: a.x1,
					y1: a.y1,
					x2: a.x2,
					y2: a.y2,
					points: a.points || null
				};
			});
			const blob = new Blob([JSON.stringify(clean, null, 2)], {
				type: "application/json"
			});
			const url = URL.createObjectURL(blob);
			const a = document.createElement("a");
			a.href = url;
			a.download = "annotations.json";
			a.click();
			URL.revokeObjectURL(url);
		};

		const viewerElement = document.getElementById("viewer");
		const viewerWidth = viewerElement.clientWidth;
		const navWidth = Math.max(120, viewerWidth * 0.15); // min size safeguard
		const navHeight = navWidth * 0.75;
	
		// Initialize OpenSeadragon
		function loadViewer(slide) {
			const dziUrl = `https://${blob}.blob.core.windows.net/${blob}/slides/${slide.ID}/${slide.ID}.dzi`;
			
			viewer = OpenSeadragon({
				id: "viewer",
				prefixUrl: "https://openseadragon.github.io/openseadragon/images/",
				tileSources: dziUrl,
				animationTime: 1.2,   // default ~1.2, tweak 0.8–1.5
				springStiffness: 6.5,  // lower = smoother glide
				
				showNavigator: true,
				crossOriginPolicy: 'Anonymous',
				navigatorPosition: "TOP_RIGHT",
				navigatorAutoFade: true,
				minZoomImageRatio: 0.9,
				visibilityRatio: 1.0,
				navigatorWidth: navWidth,   // 15% of viewer width
				navigatorHeight: navHeight,
				navigatorBackground: "#222",
				navigatorBorderColor: "#999",
				navigatorDisplayRegionColor: "red",
				
				showNavigationControl: true,
				showZoomControl: true,
				showHomeControl: true,
				showFullPageControl: true,
				showRotationControl: false,
				navigationControlAnchor: OpenSeadragon.ControlAnchor.BOTTOM
			});
			
			// SVG overlay for creating annotations
			viewer.addHandler("open", updateSVGOverlay);
			const svg = document.getElementById("annotationSVG");
			viewer.addHandler("open", function () {
				const tiledImage = viewer.world.getItemAt(0);
				const size = tiledImage.getContentSize();
				// Attach SVG to image bounds
				viewer.addOverlay({
					element: svg,
					location: tiledImage.getBounds(true)
				});
				// Set SVG coordinate system to IMAGE pixels
				svg.setAttribute("viewBox", `0 0 ${size.x} ${size.y}`);
			});

			// Adding point annotation
			let imagePoint = null;
			viewer.addHandler("canvas-click", function(event) {
				if (annotationMode !== "point") return;
				console.log("CLICK");
				event.preventDefaultAction = true; // Stop OpenSeadragon from auto-zooming
				const vp = viewer.viewport.pointFromPixel(event.position);
				const tiledImage = viewer.world.getItemAt(0);
				if (!vp){
					console.warn("Not able to establish viewport coordinate - CLICK");
					return;
				}
				const imagePoint = tiledImage.viewportToImageCoordinates(vp);
				const color = document.getElementById("colorPicker").value;
				const pointLabel = prompt("Enter annotation label:");
				if (!pointLabel){
					shapeCleanup();
					return;
				}
				const pointAnnotation = {
					id: Date.now(),
					type: "point",
					x: imagePoint.x,
					y: imagePoint.y,
					color: color,
					text: pointLabel,
					visible: true,
				};
				console.log("POINT CREATED:", pointAnnotation); // debug
				drawPoint(pointAnnotation);
				annotations.push(pointAnnotation);
				addAnnotationToSidebar(pointAnnotation);
				shapeCleanup();
			});

			// Adding rectangle annotation
			let startPoint = null;
			let currentPoint = null;
			let currentRect = null;
			viewer.addHandler("canvas-press", function(event) {
				if (annotationMode !== "rect") return;
				console.log("PRESS");
				event.preventDefaultAction = true; // Stop OpenSeadragon from auto-zooming
				const vp = viewer.viewport.pointFromPixel(event.position);
				const tiledImage = viewer.world.getItemAt(0);
				if (!vp){
					console.warn("Not able to establish viewport coordinate - PRESS");
					return;
				}
				startPoint = tiledImage.viewportToImageCoordinates(vp);
				if (!startPoint || !isFinite(startPoint.x) || !isFinite(startPoint.y)) {
					console.warn("Invalid startPoint");
					startPoint = null;
					return;
				}
				const svg = document.getElementById("annotationSVG");
				currentRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
				const color = document.getElementById("colorPicker").value;
				currentRect.setAttribute("stroke", color);
				currentRect.setAttribute("fill", color);
				currentRect.setAttribute("fill-opacity", "0.25");
				currentRect.setAttribute("stroke-width", "2");
				svg.appendChild(currentRect);
			});
			// Update rectangle preview while dragging
			viewer.addHandler("canvas-drag", function(event) {
				if (annotationMode !== "rect" || !startPoint || !currentRect) return;
				event.preventDefaultAction = true; // Stop OpenSeadragon from panning
				console.log("DRAG");
				const vp = viewer.viewport.pointFromPixel(event.position);
				const tiledImage = viewer.world.getItemAt(0);
				if (!vp) return;
				const currentPoint = tiledImage.viewportToImageCoordinates(vp);
				if (!currentPoint) return;
				const x = Math.min(startPoint.x, currentPoint.x);
				const y = Math.min(startPoint.y, currentPoint.y);
				const width = Math.abs(currentPoint.x - startPoint.x);
				const height = Math.abs(currentPoint.y - startPoint.y);
				currentRect.setAttribute("x", x);
				currentRect.setAttribute("y", y);
				currentRect.setAttribute("width", width);
				currentRect.setAttribute("height", height);
			});
			viewer.addHandler("canvas-release", function(event) {
				if (annotationMode !== "rect" || !startPoint || !currentRect) return;
				event.preventDefaultAction = true;
				console.log("RELEASE");
				const vp = viewer.viewport.pointFromPixel(event.position);
				const tiledImage = viewer.world.getItemAt(0);
				const endPoint = tiledImage.viewportToImageCoordinates(vp);
				const width = Math.abs(endPoint.x - startPoint.x);
				const height = Math.abs(endPoint.y - startPoint.y);
				const rectLabel = prompt("Enter annotation label:");
				if (!rectLabel || width < 1 || height < 1) {
					currentRect.remove();
					shapeCleanup();
					return;
				}
				const color = document.getElementById("colorPicker").value;
				
				const rectAnnotation = {
					id: Date.now(),
					type: "rect",
					x1: startPoint.x,
					y1: startPoint.y,
					x2: endPoint.x,
					y2: endPoint.y,
					color: color,
					text: rectLabel,
					visible: true,
					element: currentRect
				};
				console.log("RECT CREATED:", rectAnnotation); // debug

				rectAnnotation.element = currentRect;
				annotations.push(rectAnnotation);
				addAnnotationToSidebar(rectAnnotation);
				shapeCleanup();
			});

			// Load annotations
			viewer.addHandler("open", function () {
				fetch(`https://<blob>/slides/${slideId}/annotations.json`)
					.then(res => res.json())
					.then(data => {
						data.forEach(a => {
							annotations.push(a);
							if (a.type === "point") drawPoint(a);
							if (a.type === "rect") drawRectangle(a);
							addAnnotationToSidebar(a);
						});
					});
			});

			// Obtain coordinates for deep link to OSD position
			viewer.addHandler('open', function () {
				const { zoom, x, y } = getParams();
				if (!isNaN(zoom) && !isNaN(x) && !isNaN(y)) {
					const point = new OpenSeadragon.Point(x, y);
					viewer.viewport.zoomTo(zoom);
					viewer.viewport.panTo(point);
				}
			});
		}

		function setAnnotationMode(mode) {
			annotationMode = mode;
			const viewerEl = document.getElementById("viewer");
			
			if (mode) {
				console.log("Entering annotation mode:", mode);
				//viewer.setMouseNavEnabled(false); // disable pan/zoom
				viewerEl.style.cursor = "crosshair";
			} else {
				console.log("Exiting annotation mode");
				//viewer.setMouseNavEnabled(true); // restore navigation
				viewerEl.style.cursor = "pointer";
			}
		}

		function updateSVGOverlay() {
			const svg = document.getElementById("annotationSVG");
			const tiledImage = viewer.world.getItemAt(0);
			if (!tiledImage){
				console.log("Failed to find tiled image")
				return;
			}
			const contentSize = tiledImage.getContentSize();
			svg.setAttribute("viewBox", `0 0 ${contentSize.x} ${contentSize.y}`);
		}

		function drawPoint(p) {
			const svg = document.getElementById("annotationSVG");
			const point = document.createElementNS("http://www.w3.org/2000/svg", "circle");
			point.setAttribute("cx", p.x);
			point.setAttribute("cy", p.y);
			point.setAttribute("vector-effect", "non-scaling-stroke");
			point.setAttribute("r", 30); // adjust size as needed
			point.setAttribute("fill", p.color);
			point.setAttribute("stroke", #000);
			point.setAttribute("stroke-width", "6");
			svg.appendChild(point);
			p.element = point;
		}
		
		function drawRectangle(r) {
			const svg = document.getElementById("annotationSVG");
			const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
			const tiledImage = viewer.world.getItemAt(0)	
			const vp1 = tiledImage.viewportToImageCoordinates({ x: r.x1, y: r.y1 });
			const vp2 = tiledImage.viewportToImageCoordinates({ x: r.x2, y: r.y2 });
			const x = Math.min(vp1.x, vp2.x);
			const y = Math.min(vp1.y, vp2.y);
			const w = Math.abs(vp2.x - vp1.x);
			const h = Math.abs(vp2.y - vp1.y);
			
			rect.setAttribute("x", x);
			rect.setAttribute("y", y);
			rect.setAttribute("width", w);
			rect.setAttribute("height", h);
			rect.setAttribute("stroke", r.color);
			rect.setAttribute("fill", r.color);
			rect.setAttribute("fill-opacity", "0.15");
			rect.setAttribute("stroke-width", "6");
			svg.appendChild(rect);
			r.element = rect;
		}

		function addAnnotationToSidebar(annotation) {
			const container = document.getElementById("annotationList");
			const item = document.createElement("div");
			item.className = "annotation-item";
			item.style.borderLeft = `6px solid ${annotation.color || "black"}`;
			// Visibility toggle
			const toggle = document.createElement("input");
			toggle.type = "checkbox";
			toggle.checked = true;
			toggle.className = "annotation-toggle";
			toggle.onchange = () => {
				annotation.visible = toggle.checked;
				updateAnnotationVisibility(annotation);
			};
			// Label text
			const label = document.createElement("span");
			label.textContent = annotation.text;
			// Click to focus
			item.onclick = (e) => {
				if (e.target === toggle) return;
				console.log("CLICKED ANNOTATION:", annotation); // debug
				let center;
				if (annotation.type === "point") {
					center = { x: annotation.x, y: annotation.y };
				} else if (annotation.type === "rect") {
					center = {
						x: (annotation.x1 + annotation.x2) / 2,
						y: (annotation.y1 + annotation.y2) / 2
					};
				}
				console.log("CENTER:", center); // debug
				const tiledImage = viewer.world.getItemAt(0);
				if (!tiledImage) return;
				// Convert image coords to viewport coords using bounds
				const bounds = tiledImage.getBounds(true); // viewport space
				const imageSize = tiledImage.getContentSize(); // image pixels
				const normX = center.x / imageSize.x;
				const normY = center.y / imageSize.y;
				const vp = new OpenSeadragon.Point(
					bounds.x + bounds.width * normX,
					bounds.y + bounds.height * normY
				);
				console.log("ROBUST VP:", vp);
				if (annotation.type === "point") {
					const boxSize = 500; // 500 pixel bounding box around point
					const boxBounds = {
						x: center.x - boxSize / 2,
						y: center.y - boxSize / 2,
						width: boxSize,
						height: boxSize
					};
					viewer.viewport.panTo(vp, false, true); // immediate = false, constrain = true
					zoomToBounds(boxBounds);
				}
				if (annotation.type === "rect") {
					const shapeBounds = {
						x: Math.min(annotation.x1, annotation.x2),
						y: Math.min(annotation.y1, annotation.y2),
						width: Math.abs(annotation.x2 - annotation.x1),
						height: Math.abs(annotation.y2 - annotation.y1)
					};
					viewer.viewport.panTo(vp, false, true); // immediate = false, constrain = true
					zoomToBounds(shapeBounds);
				}
			};	
			item.appendChild(toggle);
			item.appendChild(label);
			container.appendChild(item);
		}

		function shapeCleanup() {
			imagePoint = null;
			startPoint = null;
			currentPoint = null;
			currentRect = null;
			setAnnotationMode(null);
			document.getElementById("viewer").style.cursor = "pointer";
		}

		function updateAnnotationVisibility(annotation) {
			const shouldShow = globalAnnotationsVisible && annotation.visible;
			if (annotation.element) {
				annotation.element.style.display = shouldShow ? "block" : "none";
			}
		}

		function zoomToBounds(bounds) {
			const tiledImage = viewer.world.getItemAt(0);
			const imageSize = tiledImage.getContentSize();
			const imgBounds = tiledImage.getBounds(true);
			const norm = {
				x: bounds.x / imageSize.x,
				y: bounds.y / imageSize.y,
				w: bounds.width / imageSize.x,
				h: bounds.height / imageSize.y
			};
			const vpRect = new OpenSeadragon.Rect(
				imgBounds.x + imgBounds.width * norm.x,
				imgBounds.y + imgBounds.height * norm.y,
				imgBounds.width * norm.w,
				imgBounds.height * norm.h
			);
			setTimeout(() => {
						viewer.viewport.fitBounds(vpRect, false);
					},150);
		}

		function getParams() {
			const params = new URLSearchParams(window.location.search);
			return {
				zoom: parseFloat(params.get("zoom")),
				x: parseFloat(params.get("x")),
				y: parseFloat(params.get("y")),
			};
		}
		
		function generateLink() {
			const center = viewer.viewport.getCenter();
			const zoom = viewer.viewport.getZoom();
			const params = new URLSearchParams(window.location.search);
			params.set("zoom", center ? zoom.toFixed(4) : "");
			params.set("x", center.x.toFixed(4));
			params.set("y", center.y.toFixed(4));
			return `${window.location.origin}${window.location.pathname}?${params.toString()}`;
		}

		function copyLink() {
			const link = generateLink();
			navigator.clipboard.writeText(link);
			alert("Link copied!");
		}
		
	</script>

</body>
