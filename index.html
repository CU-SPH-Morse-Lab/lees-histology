<!DOCTYPE html>
<html>
<head>
  <title>Lee's Histology</title>

  <style>
    #layout {
      display: flex;
    }
    
    #sidebar {
      width: 25%;
      max-width: 300px;
      background: #f4f4f4;
      padding: 15px;
      height: 100vh;
      overflow-y: auto;
      position: sticky;
      top: 0;
    }
    
    #mainGallery {
      flex-grow: 1;
      padding: 20px;
    }
    
    .section {
      margin-bottom: 40px;
    }
    
    .section h2 {
      border-bottom: 2px solid #ccc;
      padding-bottom: 5px;
    }
    
    .galleryRow {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
  </style>
</head>

<body>

<h1>Lee's Histo Slide Gallery Beta Test</h1>

<div id="layout">

  <div id="sidebar">
    <h3>Search</h3>
    <input type="text" id="searchBox" placeholder="Search...">

    <h3>Tags</h3>
    <div id="tagFilters"></div>

    <h3>View Tissue Type:</h3>
    <div id="tissueLinks"></div>

    <h3>View Organ System:</h3>
    <div id="systemLinks"></div>
  </div>

  <div id="mainGallery"></div>

</div>

<script>
const blob = "leeshistology";

let allSlides = [];

fetch("slides.json")
  .then(res => res.json())
  .then(slides => {
    allSlides = slides;
    renderGroupedSlides(slides);
    buildJumpLinks(slides);
    setupFilters();
  });

function renderGroupedSlides(slides) {
  const container = document.getElementById("mainGallery");
  container.innerHTML = "";
  const tissues = ["Epithelium", "Connective", "Muscle", "Nervous"];

  // Group by tissue type
  tissues.forEach(tissue => {
    const sectionSlides = slides.filter(s => {
      const t = s.metadata.Tissue;
      return Array.isArray(t) ? t.includes(tissue) : t === tissue;
    });
    if (sectionSlides.length === 0) return;
    const section = createSection(`Tissue: ${tissue}`, sectionSlides);
    section.id = `tissue-${tissue}`;
    container.appendChild(section);
  });

  // Group by organ system
  const systems = [...new Set(slides.map(s => s.metadata.System))];
  systems.forEach(system => {
    const sectionSlides = slides.filter(s => s.metadata.System === system);
    if (sectionSlides.length === 0) return;
    const section = createSection(`System: ${system}`, sectionSlides);
    section.id = `system-${system}`;
    container.appendChild(section);
  });
}

function createSection(title, slides) {
  const section = document.createElement("div");
  section.className = "section";
  const heading = document.createElement("h2");
  heading.textContent = title;
  const row = document.createElement("div");
  row.className = "galleryRow";
  slides.forEach(slide => {
    row.appendChild(createCard(slide));
  });
  section.appendChild(heading);
  section.appendChild(row);
  return section;
}

function createCard(slide) {
  const blob = "leeshistology";
  const card = document.createElement("div");
  card.className = "card";
  const link = document.createElement("a");
  link.href = `viewer.html?slide=${slide.ID}`;
  const img = document.createElement("img");
  img.src = `https://${blob}.blob.core.windows.net/${blob}/slides/${slide.ID}/${slide.ID}_thumb.jpg`;
  const label = document.createElement("div");
  label.textContent = slide.Title;
  link.appendChild(img);
  link.appendChild(label);
  card.appendChild(link);
  return card;
}


function buildJumpLinks(slides) {
  const tissueLinks = document.getElementById("tissueLinks");
  const systemLinks = document.getElementById("systemLinks");
  
  const tissues = ["Epithelium", "Connective", "Muscle", "Nervous"];
  tissues.forEach(t => {
    const link = document.createElement("div");
    link.innerHTML = `<a href="#tissue-${t}">${t}</a>`;
    tissueLinks.appendChild(link);
  });

  const systems = [...new Set(slides.map(s => s.metadata.System))];
  systems.forEach(s => {
    const link = document.createElement("div");
    link.innerHTML = `<a href="#system-${s}">${s}</a>`;
    systemLinks.appendChild(link);
  });
}

// Setup filtering logic
function setupFilters() {
  document.querySelectorAll("#controls input").forEach(el => {
    el.addEventListener("input", applyFilters);
    el.addEventListener("change", applyFilters);
  });
  document.getElementById("systemDropdown")
    .addEventListener("change", applyFilters);
}

// Filter engine
function applyFilters() {
  const search = document.getElementById("searchBox").value.toLowerCase();

  const selectedTissues = [...document.querySelectorAll("#tissueFilters input:checked")]
    .map(el => el.value);

  const selectedSystem = document.getElementById("systemDropdown").value;

  const filtered = allSlides.filter(slide => {

    const meta = slide.metadata;

    // Text search
    const matchesSearch =
      slide.Title.toLowerCase().includes(search) ||
      (meta.tags || []).some(tag => tag.toLowerCase().includes(search));

    // 🧬 Tissue match (multi-category ready)
    const matchesTissue =
      selectedTissues.length === 0 ||
      selectedTissues.includes(meta.Tissue);

    // System match
    const matchesSystem =
      !selectedSystem || meta.System === selectedSystem;

    return matchesSearch && matchesTissue && matchesSystem;
  });

  renderSlides(filtered);
}
</script>

</body>
</html>
